# Gnana Server — Fly.io configuration
# Docs: https://fly.io/docs/reference/configuration/

app = "gnana-server"
primary_region = "iad"

[build]

[env]
  NODE_ENV = "production"
  PORT = "4000"

[http_service]
  internal_port = 4000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "connections"
    hard_limit = 250
    soft_limit = 200

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"

[checks]
  [checks.health]
    type = "http"
    port = 4000
    path = "/health"
    interval = "30s"
    timeout = "5s"

name: Deploy

on:
  push:
    branches: [main]
    tags: ["v*"]

env:
  FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

jobs:
  # Deploy API server to Fly.io
  deploy-api:
    name: Deploy API
    runs-on: ubuntu-latest
    timeout-minutes: 15
    concurrency: deploy-api

    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy --remote-only --config fly.toml

  # Deploy dashboard to Fly.io
  deploy-dashboard:
    name: Deploy Dashboard
    runs-on: ubuntu-latest
    timeout-minutes: 15
    concurrency: deploy-dashboard

    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy --remote-only --config fly.dashboard.toml
